services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./Server
      dockerfile: ../Dockerfile.server
    ports:
      - '5050:5000'
    environment:
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/chatapp}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./Client
      dockerfile: ../Dockerfile.client
    ports:
      - '8080:80'
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5050}
    restart: unless-stopped

volumes:
  mongo_data:
